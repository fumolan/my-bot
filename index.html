<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跑的快哥哥 · 情报日报</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #f0f2f5;
    --card: #fff;
    --text: #1a1a2e;
    --text2: #666;
    --accent: #1890ff;
    --accent-light: #e6f7ff;
    --border: #e8e8e8;
    --shadow: 0 1px 3px rgba(0,0,0,.06);
    --radius: 8px;
    --sidebar-w: 300px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background:var(--bg); color:var(--text); }

  /* ── 顶栏 ── */
  .topbar {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top:0; z-index:20; box-shadow: var(--shadow);
  }
  .topbar .brand { font-size:18px; font-weight:700; }
  .topbar .brand span { font-weight:400; font-size:13px; color:var(--text2); margin-left:8px; }
  .topbar .search-input {
    border:1px solid var(--border); border-radius:20px; padding:6px 16px;
    width:240px; font-size:13px; outline:none; transition:.2s;
  }
  .topbar .search-input:focus { border-color:var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }
  .menu-toggle { display:none; background:none; border:none; font-size:20px; cursor:pointer; padding:4px 8px; }

  /* ── 主体 ── */
  .app-body { display:flex; min-height:calc(100vh - 53px); }

  /* ── 侧栏 ── */
  .sidebar {
    width:var(--sidebar-w); min-width:var(--sidebar-w); background:var(--card);
    border-right:1px solid var(--border); overflow-y:auto; padding:12px 0;
    position:sticky; top:53px; max-height:calc(100vh - 53px);
  }
  .sidebar .cat-header {
    padding:10px 20px 6px; font-size:13px; font-weight:600; color:var(--text);
    display:flex; align-items:center; gap:6px;
  }
  .sidebar .cat-header .badge {
    font-size:11px; background:var(--accent-light); color:var(--accent);
    padding:1px 8px; border-radius:10px; font-weight:400;
  }
  .sidebar .month-group { margin-bottom:4px; }
  .sidebar .month-toggle {
    display:flex; align-items:center; gap:4px;
    padding:6px 20px; font-size:12px; color:var(--text2); cursor:pointer;
    user-select:none; border:none; background:none; width:100%; text-align:left;
  }
  .sidebar .month-toggle:hover { background:#fafafa; }
  .sidebar .month-toggle .arrow {
    display:inline-block; transition:transform .2s; font-size:10px; width:12px; text-align:center;
  }
  .sidebar .month-toggle.collapsed .arrow { transform:rotate(-90deg); }
  .sidebar .month-items { overflow:hidden; transition:max-height .3s; }
  .sidebar .month-items.collapsed { max-height:0 !important; }
  .sidebar .file-link {
    display:block; padding:5px 20px 5px 36px; font-size:12.5px; color:var(--text);
    text-decoration:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    transition:.15s; border-left:3px solid transparent;
  }
  .sidebar .file-link:hover { background:var(--accent-light); }
  .sidebar .file-link.active { color:var(--accent); background:var(--accent-light); border-left-color:var(--accent); font-weight:500; }
  .sidebar .no-results { padding:20px; text-align:center; color:#ccc; font-size:13px; }

  /* ── 内容区 ── */
  .content-area { flex:1; padding:32px 48px; max-width:880px; }
  .content-area .welcome {
    text-align:center; color:#ccc; margin-top:120px;
  }
  .content-area .welcome .stats { 
    display:flex; gap:16px; justify-content:center; margin-top:20px;
  }
  .content-area .welcome .stat-card {
    background:var(--card); border-radius:var(--radius); padding:20px 28px;
    box-shadow:var(--shadow); min-width:140px;
  }
  .content-area .welcome .stat-card .num { font-size:28px; font-weight:700; color:var(--accent); }
  .content-area .welcome .stat-card .label { font-size:13px; color:var(--text2); margin-top:4px; }
  
  .article { background:var(--card); border-radius:var(--radius); padding:36px 44px; box-shadow:var(--shadow); }
  .article h1 { font-size:22px; margin:24px 0 16px; }
  .article h2 { font-size:19px; margin:20px 0 12px; border-bottom:2px solid var(--accent); padding-bottom:6px; }
  .article h3 { font-size:16px; margin:16px 0 8px; color:#555; }
  .article p { line-height:1.85; margin:10px 0; }
  .article ul,.article ol { margin:10px 0; padding-left:24px; }
  .article li { line-height:1.85; margin:4px 0; }
  .article code { background:#f5f5f5; padding:2px 6px; border-radius:3px; font-size:13px; color:#d63384; }
  .article pre { background:#1e1e2e; color:#cdd6f4; padding:16px 20px; border-radius:6px; overflow-x:auto; margin:12px 0; }
  .article pre code { background:none; padding:0; color:inherit; }
  .article blockquote { border-left:4px solid var(--accent); padding:8px 16px; margin:12px 0; background:var(--accent-light); color:#555; border-radius:0 4px 4px 0; }
  .article table { border-collapse:collapse; width:100%; margin:12px 0; }
  .article th,.article td { border:1px solid var(--border); padding:8px 12px; text-align:left; }
  .article th { background:#fafafa; font-weight:600; }
  .article a { color:var(--accent); }
  .article strong { color:#222; }
  .article hr { border:none; border-top:1px solid var(--border); margin:24px 0; }
  .article .loading { text-align:center; color:#aaa; padding:60px 0; }

  /* ── 响应式 ── */
  @media (max-width:768px) {
    .topbar .search-input { width:160px; }
    .menu-toggle { display:block; }
    .sidebar { position:fixed; left:-300px; top:53px; bottom:0; z-index:15; transition:left .3s; }
    .sidebar.open { left:0; box-shadow:4px 0 20px rgba(0,0,0,.15); }
    .content-area { padding:20px; }
    .article { padding:20px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:12px">
    <button class="menu-toggle" onclick="toggleSidebar()" title="菜单">☰</button>
    <div class="brand">📊 情报日报<span>跑的快哥哥</span></div>
  </div>
  <input class="search-input" type="text" placeholder="🔍 搜索日报..." oninput="filterReports(this.value)">
</div>

<div class="app-body">
  <nav class="sidebar" id="sidebar">
    <div id="nav-container">
      <div style="text-align:center;padding:40px 20px;color:#ccc;">加载中...</div>
    </div>
  </nav>

  <main class="content-area" id="main-content">
    <div class="welcome" id="welcome">
      <div style="font-size:56px;margin-bottom:16px;">📋</div>
      <p style="font-size:15px;color:#999;">选择一篇日报开始阅读</p>
      <div class="stats" id="stats"></div>
    </div>
    <div class="article" id="article" style="display:none"></div>
  </main>
</div>

<script>
let manifest = null;

function formatLabel(f, date) {
  let s = f.replace(/\.md$/, '');
  // 文件名已经处理得挺好了，微调
  s = s.replace(/^(\d{4}-\d{2}-\d{2}-\d{4})-(.+)/, '$1 · $2');
  s = s.replace(/^(\d{4}-\d{2}-\d{2})-(.+)/, '$1 · $2');
  // 把长的-替换为简要
  s = s.replace('后端求职情报日报_', '');
  s = s.replace(/_/g, ' ');
  return s;
}

async function loadManifest() {
  try {
    const r = await fetch('reports.json');
    return await r.json();
  } catch(e) { console.error(e); return null; }
}

function buildNav() {
  const container = document.getElementById('nav-container');
  if (!manifest) {
    container.innerHTML = '<div style="text-align:center;padding:40px 20px;color:#ccc;">加载失败</div>';
    return;
  }

  let html = '';
  for (const cat of manifest.categories) {
    html += `<div class="cat-header">${cat.icon} ${cat.name} <span class="badge">${cat.total}</span></div>`;
    
    if (cat.months.length === 0) {
      html += '<div class="no-results">暂无数据</div>';
      continue;
    }
    
    for (const month of cat.months) {
      // 默认展开本月和上月
      const isCurrent = month.key === getCurrentMonth();
      const collapsedClass = isCurrent ? '' : 'collapsed';
      const arrowClass = isCurrent ? '' : 'collapsed';
      const maxH = (month.items.length * 30) + 'px';
      
      html += `<div class="month-group">`;
      html += `<button class="month-toggle ${arrowClass}" onclick="toggleMonth(this)">
        <span class="arrow">▼</span> ${month.label} <span style="color:#aaa;font-size:11px">(${month.items.length})</span>
      </button>`;
      html += `<div class="month-items ${collapsedClass}" style="max-height:${isCurrent ? maxH : '0'}">`;
      
      for (const item of month.items) {
        html += `<a href="#${item.path}" class="file-link" 
                  data-path="${item.path}" data-cat="${cat.slug}"
                  data-label="${item.label.toLowerCase()}" data-date="${item.date}"
                  onclick="loadArticle(event, '${item.path}')">
                  ${formatLabel(item.name, item.date)}</a>`;
      }
      
      html += '</div></div>';
    }
  }
  
  container.innerHTML = html;
  
  // 更新统计
  const stats = document.getElementById('stats');
  const total = manifest.categories.reduce((s, c) => s + c.total, 0);
  const latest = manifest.categories.map(c => c.latest_date).sort().pop() || '';
  stats.innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="label">累计日报</div></div>
    <div class="stat-card"><div class="num">${manifest.categories.length}</div><div class="label">情报频道</div></div>
    <div class="stat-card"><div class="num">${latest.slice(5) || '-'}</div><div class="label">最新日期</div></div>
  `;
}

function getCurrentMonth() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function toggleMonth(btn) {
  const items = btn.nextElementSibling;
  const isOpen = !items.classList.contains('collapsed');
  if (isOpen) {
    items.classList.add('collapsed');
    items.style.maxHeight = '0';
    btn.classList.add('collapsed');
  } else {
    items.classList.remove('collapsed');
    items.style.maxHeight = (items.children.length * 30) + 'px';
    btn.classList.remove('collapsed');
  }
}

function filterReports(query) {
  query = query.toLowerCase().trim();
  const links = document.querySelectorAll('.file-link');
  const groups = document.querySelectorAll('.month-group');
  
  if (!query) {
    // 恢复所有
    links.forEach(l => { l.style.display = ''; l.classList.remove('active'); });
    groups.forEach(g => g.style.display = '');
    return;
  }
  
  // 隐藏不匹配的
  let visibleGroups = new Set();
  links.forEach(l => {
    const label = l.dataset.label || '';
    const date = l.dataset.date || '';
    if (label.includes(query) || date.includes(query)) {
      l.style.display = '';
      visibleGroups.add(l.closest('.month-group'));
    } else {
      l.style.display = 'none';
    }
  });
  
  // 隐藏空的月份组，展开有结果的
  groups.forEach(g => {
    const hasVisible = [...g.querySelectorAll('.file-link')].some(l => l.style.display !== 'none');
    g.style.display = hasVisible ? '' : 'none';
    // 展开这个组
    if (hasVisible) {
      const items = g.querySelector('.month-items');
      const btn = g.querySelector('.month-toggle');
      if (items && btn) {
        items.classList.remove('collapsed');
        items.style.maxHeight = 'none';
        btn.classList.remove('collapsed');
      }
    }
  });
}

async function loadArticle(e, path) {
  e.preventDefault();
  
  // 更新 active
  document.querySelectorAll('.file-link').forEach(l => l.classList.remove('active'));
  const link = document.querySelector(`[data-path="${path}"]`);
  if (link) link.classList.add('active');
  
  // 加载内容
  const welcome = document.getElementById('welcome');
  const article = document.getElementById('article');
  welcome.style.display = 'none';
  article.style.display = 'block';
  article.innerHTML = '<div class="loading">加载中...</div>';
  
  // 关闭移动端侧栏
  document.getElementById('sidebar').classList.remove('open');
  
  try {
    const resp = await fetch(path);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const md = await resp.text();
    article.innerHTML = marked.parse(md);
  } catch(err) {
    article.innerHTML = `<div style="text-align:center;color:#e74c3c;padding:60px 0;">❌ 加载失败: ${err.message}</div>`;
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ── 初始化 ──
(async function init() {
  manifest = await loadManifest();
  buildNav();
  
  // URL hash 自动加载
  if (location.hash) {
    const path = location.hash.slice(1);
    const link = document.querySelector(`[data-path="${path}"]`);
    if (link) {
      link.classList.add('active');
      // 展开对应的月份
      const monthGroup = link.closest('.month-group');
      if (monthGroup) {
        const items = monthGroup.querySelector('.month-items');
        const btn = monthGroup.querySelector('.month-toggle');
        if (items) { items.classList.remove('collapsed'); items.style.maxHeight = 'none'; }
        if (btn) btn.classList.remove('collapsed');
      }
      // 加载文章
      loadArticle(new Event('click'), path);
    }
  }
})();
</script>
</body>
</html>
